<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>FUSE — Bientôt disponible</title>
  <link href="https://fonts.googleapis.com/css2?family=Kaisei+Decol:wght@700&family=Poppins&display=swap" rel="stylesheet" />
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #F6F6F6;
      color: #0A036B;
      min-height: 100vh;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 24px;
    }
    h1 {
      font-family: 'Kaisei Decol', serif;
      font-size: clamp(40px, 6vw, 72px);
      color: #4C69A8;
      margin: 0 0 16px;
    }
    p {
      color: #4C69A8;
      margin: 0 0 28px;
    }
    a {
      display: inline-block;
      padding: 12px 28px;
      border-radius: 999px;
      background: #0A036B;
      color: #fff;
      text-decoration: none;
      font-size: 14px;
      transition: background .3s;
    }
    a:hover {
      background: #4C69A8;
    }
  </style>
</head>
<body>
  <div>
    <h1>Bientôt disponible.</h1>
    <p>Cette page est en cours de construction.</p>
    <a href="/">Retour à l'accueil</a>
  </div>
</body>
</html>
